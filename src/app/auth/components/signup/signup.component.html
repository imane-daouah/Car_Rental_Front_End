<div class="signup-container">
  <h2>Créer un nouveau compte</h2>
  <form (ngSubmit)="onSubmit()" [formGroup]="signupForm" class="signup-form">
    <div class="form-group">
      <label for="nom">Nom</label>
      <input id="nom" type="text" formControlName="nom" placeholder="Nom" required />
    </div>
    <div class="form-group">
      <label for="prenom">Prénom</label>
      <input id="prenom" type="text" formControlName="prenom" placeholder="Prénom" required />
    </div>
    <div class="form-group">
      <label for="email">Email</label>
      <input id="email" type="email" formControlName="email" placeholder="Email" required />
    </div>
    <div class="form-group">
      <label for="numero_tel">Numéro de téléphone</label>
      <input id="numero_tel" type="text" formControlName="numero_tel" placeholder="Numéro de téléphone" required />
    </div>
    <div class="form-group">
      <label for="userRole">Rôle</label>
      <select id="userRole" formControlName="userRole" required>
        <option value="ADMIN">ADMIN</option>
        <option value="USER">USER</option>
      </select>
    </div>
    <div class="form-group">
      <label for="adresse">Adresse</label>
      <input id="adresse" type="text" formControlName="adresse" placeholder="Adresse" required />
    </div>
    <div class="form-group">
      <label for="password">Mot de passe</label>
      <input id="password" type="password" formControlName="password" placeholder="Mot de passe" required />
    </div>
    <button type="submit" class="btn">Créer un compte</button>
  </form>
</div>
