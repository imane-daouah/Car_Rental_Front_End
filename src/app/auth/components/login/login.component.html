<div class="login-container">
  <h2>Login</h2>
  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
    <div class="form-group">
      <label for="email">Email</label>
      <input id="email" type="email" formControlName="email" placeholder="Votre email" />
    </div>
    <div class="form-group">
      <label for="password">Mot de passe</label>
      <input id="password" type="password" formControlName="password" placeholder="Votre mot de passe" />
    </div>
    <button type="submit" class="btn">Log in</button>
  </form>
  <p>Or <a routerLink="/register">register now!</a></p>
</div>
